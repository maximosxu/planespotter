<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plane Spotter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === Keyframes === */
        @keyframes pulse-ring {
            0%   { transform: scale(1);   opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0;   }
        }

        @keyframes card-enter {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            to { background-position: -200% 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        /* === Header === */
        header {
            position: relative;
            padding: 16px 20px;
            background: linear-gradient(135deg, #3b1a2e 0%, #2a1025 100%);
            border-bottom: 1px solid #4a2040;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #f9a8d4, #c084fc, #f472b6, #f9a8d4);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        header h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-plane {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        #status {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* === Button === */
        #refresh-btn {
            padding: 8px 18px;
            background: linear-gradient(135deg, #831843, #6b2150);
            color: #f9a8d4;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.15s ease;
            box-shadow: 0 2px 8px rgba(131, 24, 67, 0.4);
        }

        #refresh-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(131, 24, 67, 0.5);
        }

        #refresh-btn:active {
            transform: translateY(1px) scale(0.97);
            box-shadow: 0 1px 4px rgba(131, 24, 67, 0.3);
        }

        /* === Layout === */
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex: 1;
            min-height: 300px;
        }

        #sidebar {
            width: 320px;
            background: linear-gradient(180deg, #3b1a2e 0%, #2a1025 100%);
            border-left: 1px solid #4a2040;
            overflow-y: auto;
            padding: 12px;
        }

        /* === Aircraft Cards === */
        .aircraft-card {
            background: #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            animation: card-enter 0.3s ease both;
        }

        .aircraft-card:hover {
            background: #475569;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .callsign {
            font-size: 16px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .details {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* === Color-Coded Badges === */
        .badge {
            padding: 3px 9px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-country {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .badge-alt {
            background: rgba(251, 191, 36, 0.12);
            color: #fcd34d;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .badge-speed {
            background: rgba(52, 211, 153, 0.12);
            color: #6ee7b7;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .badge-dist {
            background: rgba(244, 114, 182, 0.12);
            color: #f9a8d4;
            border: 1px solid rgba(244, 114, 182, 0.2);
        }

        .badge-route {
            background: rgba(56, 189, 248, 0.12);
            color: #7dd3fc;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .badge-time {
            background: rgba(251, 146, 60, 0.12);
            color: #fdba74;
            border: 1px solid rgba(251, 146, 60, 0.2);
        }

        .airline-name {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }

        .detail-btn {
            padding: 4px 12px;
            background: linear-gradient(135deg, #831843, #6b2150);
            color: #f9a8d4;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.15s ease;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
        }

        .detail-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(131, 24, 67, 0.4);
        }

        .detail-btn:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .detail-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(249, 168, 212, 0.3);
            border-top-color: #f9a8d4;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        .card-details {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            animation: card-enter 0.2s ease both;
        }

        .detail-row {
            font-size: 12px;
            color: #cbd5e1;
            padding: 2px 0;
        }

        .detail-label {
            color: #64748b;
            margin-right: 6px;
            font-weight: 600;
        }

        .detail-error {
            font-size: 12px;
            color: #64748b;
            font-style: italic;
        }

        /* === Plane Map Marker === */
        .plane-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none !important;
            border: none !important;
            filter: drop-shadow(0 0 6px rgba(231, 0, 116, 0.6));
            transition: transform 0.2s ease;
        }

        .plane-icon:hover {
            transform: scale(1.3);
        }

        /* === User Location Marker === */
        .user-marker {
            position: relative;
            width: 20px;
            height: 20px;
        }

        .user-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
        }

        .user-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: rgba(59, 130, 246, 0.4);
            border-radius: 50%;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        /* === Loading State === */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 48px 24px;
            color: #64748b;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            font-size: 14px;
            font-weight: 600;
        }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
        }

        .empty-plane-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .empty-sub {
            font-size: 13px;
            color: #64748b;
        }

        /* === Mobile Tab Bar === */
        .mobile-tabs {
            display: none;
            background: linear-gradient(135deg, #3b1a2e 0%, #2a1025 100%);
            border-top: 1px solid #4a2040;
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            gap: 8px;
        }

        .mobile-tabs button {
            flex: 1;
            padding: 10px 0;
            border: 1px solid #4a2040;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .mobile-tabs button.active {
            background: linear-gradient(135deg, #831843, #6b2150);
            color: #f9a8d4;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(131, 24, 67, 0.4);
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            body {
                height: 100vh;
                height: 100dvh;
            }

            header {
                padding: 10px 14px;
            }

            header h1 { font-size: 17px; }
            #status { font-size: 12px; }

            .content {
                flex-direction: column;
                position: relative;
            }

            #map {
                flex: 1;
                min-height: 0;
            }

            #sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid #4a2040;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                max-height: none;
                display: none;
                z-index: 1000;
            }

            #sidebar.mobile-visible {
                display: block !important;
            }

            .mobile-tabs {
                display: flex;
            }

            .aircraft-card {
                padding: 14px;
                margin-bottom: 10px;
            }

            .callsign { font-size: 17px; }

            .badge {
                padding: 5px 11px;
                font-size: 12px;
            }

            .details { gap: 8px; }

            /* Larger Leaflet zoom controls for touch */
            .leaflet-control-zoom a {
                width: 40px !important;
                height: 40px !important;
                line-height: 40px !important;
                font-size: 20px !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>
                <svg class="header-plane" viewBox="0 0 28 28" fill="none">
                    <path d="M14 2L16.5 10L24 13V15L16.5 13L16.5 20L19 23V25L14 23L9 25V23L11.5 20L11.5 13L4 15V13L11.5 10L14 2Z" fill="#f9a8d4"/>
                </svg>
                Plane Spotter
            </h1>
            <div id="status">Initializing...</div>
        </div>
        <button id="refresh-btn">Refresh</button>
    </header>
    <div class="content">
        <div id="map"></div>
        <div id="sidebar">
            <div id="aircraft-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <div class="loading-text">Scanning the skies...</div>
                </div>
            </div>
        </div>
    </div>
    <div class="mobile-tabs">
        <button id="tab-map" class="active">Map</button>
        <button id="tab-list">List</button>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
