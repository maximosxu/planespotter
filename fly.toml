# fly.toml app configuration file generated for planespotter-dhs4eg on 2026-03-31T03:30:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'planespotter-dhs4eg'
primary_region = 'sjc'

[build]

[processes]
  app = "/app/.venv/bin/gunicorn app:app --threads 2 --bind 0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
